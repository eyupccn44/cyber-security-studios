name: New Agent Request
title: '[AGENT] '
labels: ["enhancement", "new-agent"]
assignees: []
body:
  - type: input
    id: agent-name
    attributes:
      label: Agent Name
      placeholder: e.g., cloud-forensics-analyst
    validations:
      required: true

  - type: textarea
    id: role-description
    attributes:
      label: Role Description
      description: What does this agent specialize in? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Tier
      options:
        - Tier 1 — Director (CISO-level strategic role)
        - Tier 2 — Lead (Department management)
        - Tier 3 — Specialist (Hands-on technical work)
    validations:
      required: true

  - type: textarea
    id: skills
    attributes:
      label: Skills/Commands This Agent Would Handle
      description: List the slash commands this agent would be invoked by

  - type: textarea
    id: why-missing
    attributes:
      label: Why Is This Missing?
      description: What use cases are not covered by existing agents?
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Industry role references, frameworks, methodology links
